services:
  mariadb:
    image: mariadb:11.4
    container_name: vibeenglish-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpw
      MARIADB_DATABASE: vibeenglish
      MARIADB_USER: vibe
      MARIADB_PASSWORD: vibepw
    ports:
      - "13307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mariadb_data:
